name: Automatic Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release info
        id: release_info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download artifact (if exists)
        id: download
        continue-on-error: true
        run: |
          # If you have build artifacts, download them here
          echo "Checking for release files..."

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "TeoAvSuite ${{ steps.release_info.outputs.tag }} - Portable Installer"
          draft: false
          prerelease: false
          body: |
            # TeoAvSuite ${{ steps.release_info.outputs.tag }}

            ## Installation
            1. Download `TeoAvSuite-v*.zip`
            2. Extract ZIP file
            3. Right-click `setup.bat` → Run as Administrator
            4. Follow on-screen instructions

            ## What's Included
            - ✅ Dashboard UI (avdashboard.exe)
            - ✅ Console host (avconsolehost.exe)
            - ✅ Update server (avupdateserver.exe)
            - ✅ Kernel driver (AvMiniFilter.sys)
            - ✅ Configuration (avsuite.json)
            - ✅ Setup script (setup.bat)
            - ✅ Full documentation (README.md)

            ## Features
            - Real-time kernel-mode threat detection
            - YARA rule engine
            - Quarantine management
            - AI Agent integration (Sentinel SIEM, Phi-3.5 LLM, EDRView, BehaviorMatrix)
            - SQLite event logging
            - Dark-themed dashboard

            ## System Requirements
            - Windows 11 (x64)
            - Administrator privileges
            - Test environment recommended

            ## Documentation
            See README.md for complete setup and troubleshooting guide.

            ---
            For updates: https://github.com/teohumble1/avsuite
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
